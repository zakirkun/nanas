services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nanas
      POSTGRES_PASSWORD: nanas
      POSTGRES_DB: nanas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanas -d nanas"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      nats:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://nanas:nanas@postgres:5432/nanas?sslmode=disable
      JWT_SECRET: change-me-in-prod
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      NATS_URL: nats://nats:4222
      DATA_PLANE_URL: http://dataplane:8090
      TENANT_DB_HOST: postgres:5432
      LOCALES_DIR: /app/locales
      MINIO_WEBHOOK_SECRET: dev-webhook-secret

  dataplane:
    build:
      context: .
      dockerfile: Dockerfile.dataplane
    ports:
      - "8090:8090"
    environment:
      DATAPLANE_ADDR: ":8090"

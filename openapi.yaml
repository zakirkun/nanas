openapi: 3.1.0
info:
  title: Nanas Control Plane API (MVP)
  version: "1.0.0"
  description: |
    Open-source backend platform for multi-tenant projects. Each project is provisioned with
    its own PostgreSQL database and S3-compatible object storage bucket. The API covers
    authentication, project lifecycle, function versions and deployments, triggers, realtime,
    observability, public function entrypoints, and platform administration.

servers:
  - url: http://localhost:8080
    description: Default local Compose deployment

tags:
  - name: Auth
    description: >
      Register accounts and exchange email and password for JWT bearer tokens used on control-plane routes.
  - name: Projects
    description: >
      Create projects, inspect provisioning status, manage members and API keys, and tune project-level settings.
  - name: Database
    description: >
      Apply allow-listed DDL to tenant PostgreSQL databases, run guarded SQL, migrations history, data catalog access, and CDC helpers where exposed.
  - name: Storage
    description: >
      Upload and download tenant-scoped objects via API-relative paths proxied to S3-compatible storage.
  - name: Functions
    description: >
      Manage functions, artifact uploads, immutable versions, builds, deployments, rollback, and project-scoped invocation.
  - name: Triggers
    description: >
      Configure HTTP, cron, database polling, object-event, and related ingress surfaces plus DLQ inspection.
  - name: Realtime
    description: >
      Subscribe to broadcast platform events over WebSocket (and SSE stubs where implemented).
  - name: Observability
    description: >
      Read structured logs, audit trails, Prometheus metrics, and optional trace summaries tied to deployments.
  - name: Integrations
    description: >
      Configure external connectors such as outbound email providers with encrypted tenant secrets.
  - name: Admin
    description: >
      Platform-operator endpoints for cross-tenant user and project governance requiring staff or super-admin roles.
  - name: Public Function
    description: >
      Stable `/fn/{project_slug}/{function_slug}` entrypoints forwarded to the dataplane with configurable auth modes.

components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BearerAPIKey:
      type: http
      scheme: bearer
      description: Project-scoped API key prefixed with `sk_`.
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret

  schemas:
    Problem:
      type: object
      required: [type, code, message]
      properties:
        type: { type: string, example: "about:blank" }
        code: { type: string, example: VALIDATION_ERROR }
        message:
          type: object
          properties:
            id: { type: string }
            en: { type: string }
        message_preferred: { type: string }
        instance: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message:
                type: object
                properties:
                  id: { type: string }
                  en: { type: string }
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string, nullable: true }
        owner_id: { type: string, format: uuid }
        region: { type: string }
        provision_status: { type: string, enum: [pending, ready, failed] }
        provision_error: { type: string, nullable: true }
        tenant_db_name: { type: string, nullable: true }
        minio_bucket: { type: string, nullable: true }
        disabled: { type: boolean }
        created_at: { type: string, format: date-time }
    Function:
      type: object
      properties:
        fn_id: { type: string, format: uuid }
        name: { type: string }
    FunctionVersion:
      type: object
      properties:
        version_id: { type: string, format: uuid }
        version: { type: string }
        runtime: { type: string }
        checksum: { type: string }
        build_status: { type: string, enum: [queued, complete, failed] }
        source_uri: { type: string }
    BuildJob:
      type: object
      properties:
        build_job_id: { type: string, format: uuid }
        job_status: { type: string }
        job_log: { type: string }
    Deployment:
      type: object
      properties:
        deployment_id: { type: string, format: uuid }
        status: { type: string, enum: [active, superseded, failed] }
    Trigger:
      type: object
      properties:
        trigger_id: { type: string, format: uuid }
        type: { type: string, enum: [http, cron, db_poll, object] }
        target_fn: { type: string, format: uuid }
        config: { type: object, additionalProperties: true }
    Entrypoint:
      type: object
      properties:
        id: { type: string, format: uuid }
        function: { type: string }
        auth_mode: { type: string, enum: [public, signed, project_key] }
        enabled: { type: boolean }
        public_url: { type: string }
        project_slug: { type: string }
        function_slug: { type: string }
        secret_token: { type: string, description: "Returned only when auth_mode=signed" }

  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Permission denied.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    Internal:
      description: Internal error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }

paths:
  /healthz:
    get:
      tags: [Observability]
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive.

  /readyz:
    get:
      tags: [Observability]
      summary: Readiness probe checking PostgreSQL and object storage.
      responses:
        '200':
          description: Both dependencies are reachable.
        '503':
          $ref: '#/components/responses/Internal'

  /openapi.yaml:
    get:
      tags: [Observability]
      summary: Serve this OpenAPI document.
      responses:
        '200': { description: OpenAPI YAML }

  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics scrape endpoint.
      responses:
        '200': { description: Prometheus text exposition format. }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user. The first user is auto-promoted to platform_role=super_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      email: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Exchange email and password for a JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/projects:
    post:
      tags: [Projects]
      security: [{ BearerJWT: [] }]
      summary: Create a project. Tenant database and object bucket are provisioned asynchronously.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                region: { type: string, default: default }
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '400': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Projects]
      security: [{ BearerJWT: [] }]
      summary: List projects accessible to the authenticated user.
      responses:
        '200':
          description: Project list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: '#/components/schemas/Project' }

  /v1/projects/{pid}:
    get:
      tags: [Projects]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Read project details, including provisioning status and tenant bindings.
      responses:
        '200':
          description: Project details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/projects/{pid}/db/migrate:
    post:
      tags: [Database]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Apply allow-listed DDL statements (CREATE TABLE, CREATE INDEX, selected CREATE EXTENSION, COMMENT ON).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql: { type: string }
      responses:
        '200':
          description: DDL applied.
        '400': { $ref: '#/components/responses/ValidationError' }

  /v1/projects/{pid}/migrations:
    get:
      tags: [Database]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: limit, schema: { type: integer, default: 50 } }
      summary: List recent DDL migrations applied from the control plane (Phase 17).
      responses:
        '200': { description: Migration history. }

  /v1/projects/{pid}/db/databases:
    get:
      tags: [Database]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: List Postgres databases visible from the tenant connection and the stored database allowlist.
      responses:
        '200':
          description: Cluster database names and allowlist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  databases:
                    type: array
                    items: { type: string }
                  allowlist:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }

  /v1/projects/{pid}/settings/database-allowlist:
    patch:
      tags: [Database]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Replace the project's database allowlist (names must exist on the cluster).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [databases]
              properties:
                databases:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Updated allowlist.
        '400': { $ref: '#/components/responses/ValidationError' }

  /v1/projects/{pid}/db/query:
    post:
      tags: [Database]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Execute a guarded SELECT/INSERT/UPDATE/DELETE statement, or run EXPLAIN ANALYZE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql: { type: string }
                params: { type: array, items: {} }
                explain: { type: boolean }
      responses:
        '200':
          description: Query result.
        '400': { $ref: '#/components/responses/ValidationError' }

  /v1/projects/{pid}/storage/upload:
    post:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Returns an API-relative PUT path to upload an object via the control plane (MinIO proxy).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key: { type: string }
                expires: { type: integer, description: "Deprecated; ignored (kept for compatibility)." }
      responses:
        '200':
          description: Upload target (PUT with Authorization to upload_url).

  /v1/projects/{pid}/storage/objects:
    get:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: bucket, schema: { type: string } }
        - { in: query, name: prefix, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 200 } }
      summary: List objects in the project bucket (Phase 12).
      responses:
        '200': { description: Object list. }

  /v1/projects/{pid}/storage/objects/{key}:
    get:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: key, required: true, schema: { type: string } }
      summary: Download an object from the project bucket through the API (streams from MinIO).
      responses:
        '200':
          description: Object bytes.
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: key, required: true, schema: { type: string } }
      summary: Upload or replace an object via the API (stored in MinIO on the backend).
      responses:
        '200':
          description: Stored.
        '400': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: key, required: true, schema: { type: string } }
      summary: Delete an object from the project bucket (Phase 12).
      responses:
        '200': { description: Deleted. }

  /v1/projects/{pid}/storage/download:
    post:
      tags: [Storage]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Returns an API-relative GET path to download via the control plane (MinIO proxy).

  /v1/projects/{pid}/functions:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Create a function.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Function' }
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: limit, schema: { type: integer, default: 50 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      summary: List functions in a project with denormalised summary fields.
      responses:
        '200':
          description: Function list.

  /v1/projects/{pid}/functions/{fid}:
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Read function detail (name, slug, current_version, entrypoint summary).
      responses:
        '200': { description: Function detail. }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/projects/{pid}/functions/{fid}/deployments:
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: limit, schema: { type: integer, default: 50 } }
      summary: List deployments for a function (newest first).
      responses:
        '200': { description: Deployment list. }

  /v1/deployments/{did}:
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: did, required: true, schema: { type: string, format: uuid } }
      summary: Poll a deployment by id (PRD section 7).
      responses:
        '200': { description: Deployment status. }
        '404': { $ref: '#/components/responses/NotFound' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/projects/{pid}/functions/{fid}/draft:
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Read the in-browser code-editor draft for a function (Phase 4).
      responses:
        '200': { description: Draft. }
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Save the in-browser draft (files + env + runtime).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: object
                    required: [path, content]
                    properties:
                      path: { type: string }
                      content: { type: string }
                env:
                  type: object
                  additionalProperties: { type: string }
                runtime: { type: string, enum: [node, go, python, wasm] }
      responses:
        '200': { description: Saved. }

  /v1/projects/{pid}/functions/{fid}/source:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Package authored files into a tar.gz and upload it to the project bucket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, files]
              properties:
                version: { type: string }
                files:
                  type: array
                  items:
                    type: object
                    required: [path, content]
                    properties:
                      path: { type: string }
                      content: { type: string }
      responses:
        '200': { description: Tarball uploaded; returns artifact_key + checksum. }

  /v1/projects/{pid}/functions/{fid}/artifacts/upload:
    put:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: version, required: true, schema: { type: string } }
      summary: Upload a function artifact tarball via the API (stored in MinIO on the backend).
      responses:
        '200':
          description: Accepted and stored.

  /v1/projects/{pid}/functions/{fid}/artifacts/presign:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Returns an API-relative PUT URL (with query version=) for artifact tarball upload via the API proxy.

  /v1/projects/{pid}/functions/{fid}/versions:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Register an immutable function version and queue a build job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: string }
                runtime: { type: string }
                checksum: { type: string }
                artifact_key: { type: string }
                source_uri: { type: string }
      responses:
        '201':
          description: Version queued.
          content:
            application/json:
              schema: { allOf: [ { $ref: '#/components/schemas/FunctionVersion' }, { $ref: '#/components/schemas/BuildJob' } ] }
        '409':
          description: Version already exists.

  /v1/projects/{pid}/functions/{fid}/versions/{vid}/build:
    get:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: vid, required: true, schema: { type: string, format: uuid } }
      summary: Read function version build status.

  /v1/projects/{pid}/functions/{fid}/deploy:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Deploy a completed function version. The control plane registers the deployment with the dataplane.
      responses:
        '200':
          description: Deployment created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deployment' }
        '409':
          description: Build is not complete.

  /v1/projects/{pid}/functions/{fid}/deployments/rollback:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Reactivate the previous deployment for the function.

  /v1/projects/{pid}/functions/{fid}/invoke:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Invoke the latest active deployment for a function (project-scoped).

  /v1/projects/{pid}/functions/{fid}/invoke/async:
    post:
      tags: [Functions]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Enqueue async invocation (JetStream when NATS configured; otherwise in-process).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input: { type: object, additionalProperties: true }
      responses:
        '202':
          description: Queued with enqueue_id.

  /v1/projects/{pid}/functions/{fid}/entrypoint:
    post:
      tags: [Public Function]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Configure the public function entrypoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_mode: { type: string, enum: [public, signed, project_key] }
                enabled: { type: boolean }
      responses:
        '200':
          description: Entrypoint configuration.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Entrypoint' }
    get:
      tags: [Public Function]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: fid, required: true, schema: { type: string, format: uuid } }
      summary: Read the public function entrypoint configuration.
      responses:
        '200':
          description: Entrypoint configuration.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Entrypoint' }
        '404': { $ref: '#/components/responses/NotFound' }

  /fn/{project_slug}/{fn_slug}:
    parameters:
      - { in: path, name: project_slug, required: true, schema: { type: string } }
      - { in: path, name: fn_slug, required: true, schema: { type: string } }
    post:
      tags: [Public Function]
      summary: Public invocation entrypoint. Authentication depends on the configured auth_mode.
      description: |
        - `auth_mode=public`: no authentication.
        - `auth_mode=signed`: send `X-Entrypoint-Token` header (or `?token=`) matching the entrypoint secret.
        - `auth_mode=project_key`: send `Authorization: Bearer sk_...` for the project.
      responses:
        '200': { description: Function output. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/ingress/{tid}:
    parameters:
      - { in: path, name: tid, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Triggers]
      security: [{ WebhookSecret: [] }]
      summary: HTTP trigger ingress. Validates X-Webhook-Secret against the trigger configuration.

  /internal/minio-events:
    post:
      tags: [Triggers]
      summary: Object storage event webhook. Requires X-Minio-Webhook-Secret.

  /v1/projects/{pid}/triggers:
    post:
      tags: [Triggers]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: Create a trigger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, target_fn]
              properties:
                type: { type: string, enum: [http, cron, db_poll, object] }
                target_fn: { type: string, format: uuid }
                config:
                  type: object
                  description: |
                    For HTTP triggers, set `secret`. For cron, set `every_seconds`.
                    For db_poll, set `poll_seconds`. For object, configure MinIO bucket events.
      responses:
        '201':
          description: Trigger registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Trigger' }
    get:
      tags: [Triggers]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
      summary: List triggers in a project with dispatch counters.
      responses:
        '200': { description: Trigger list. }

  /v1/projects/{pid}/triggers/{tid}:
    get:
      tags: [Triggers]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: tid, required: true, schema: { type: string, format: uuid } }
      summary: Read a single trigger.
      responses:
        '200': { description: Trigger detail. }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Triggers]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: tid, required: true, schema: { type: string, format: uuid } }
      summary: Toggle a trigger's enabled state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200': { description: Updated. }

  /v1/projects/{pid}/triggers/{tid}/status:
    get:
      tags: [Triggers]
      security: [{ BearerJWT: [] }, { BearerAPIKey: [] }]
      parameters:
        - { in: path, name: pid, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: tid, required: true, schema: { type: string, format: uuid } }
